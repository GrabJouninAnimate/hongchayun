name: Daily Pure HTML Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "content/site.yml"
      - "scripts/site.py"
      - "assets/css/style.css"
      - "assets/js/main.js"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve site URL
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ -z "$SITE_URL" ]; then
            if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
              SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io"
            else
              SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
            fi
          fi
          echo "RESOLVED_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"

      - name: Generate article and build HTML
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            python scripts/site.py build --site-url "$RESOLVED_SITE_URL"
          elif [ -n "$KEYWORDS" ]; then
            python scripts/site.py batch --limit 1 --site-url "$RESOLVED_SITE_URL"
          else
            python scripts/site.py new "红茶云加速器机场测评" --site-url "$RESOLVED_SITE_URL"
          fi

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "daily html update"
          git push

      - name: Notify Bing via IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          python scripts/site.py indexnow --site-url "$RESOLVED_SITE_URL"
